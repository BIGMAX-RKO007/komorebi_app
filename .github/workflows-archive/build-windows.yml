# ============================================================
# komorebi_app — Windows CI/CD
# 触发：push 到 main 分支 / PR 到 main
# 产物：Windows 可执行文件
# ============================================================
name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write  # 这行是关键：允许 Action 创建 Release 和上传附件

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 构建 Windows 应用 (release)
        run: flutter build windows

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: build/windows
          retention-days: 14

      - name: 设置日期时间
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: datetime
        run: echo "date=$(Get-Date -Format 'yyyy-MM-dd-HH-mm-ss')" >> $env:GITHUB_OUTPUT

      - name: 创建 Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "windows-release-${{ steps.datetime.outputs.date }}-${{ github.run_number }}"
          name: "Windows Release ${{ steps.datetime.outputs.date }}-${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Release 产物
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/**/*.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
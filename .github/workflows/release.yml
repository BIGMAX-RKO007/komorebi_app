name: Release - Auto Publish

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: true
        default: true
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable
  JAVA_VERSION: '17'
  FRB_VERSION: '2.11.1'

jobs:
  should-release:
    name: Should Release?
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}

    steps:
      - id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            run_id="${{ github.event.workflow_run.id }}"
            commit_sha="${{ github.event.workflow_run.head_commit.id }}"
            echo "tag=auto-${run_id}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          fi

  android:
    name: Release Android
    needs: should-release
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
         

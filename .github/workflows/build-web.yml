# ============================================================
# komorebi_app — Web CI/CD
# 触发：push 到 main 分支 / PR 到 main
# 产物：Web 构建产物（可直接部署到任意静态托管）
# ============================================================
name: Web Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: 安装 nightly rust-src 组件
        run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-web-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: cargo-web-

      - name: 安装 flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.11.1

      - name: 生成 Rust ↔ Dart 绑定
        run: flutter_rust_bridge_codegen generate

      - name: 构建 Rust WASM (flutter_rust_bridge)
        run: flutter_rust_bridge_codegen build-web

      - name: 获取 Flutter 依赖
        run: flutter pub get

      - name: 构建 Flutter Web (release)
        run: flutter build web --release

      - name: 上传 Web 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web
          retention-days: 14

      - name: 设置日期时间
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: datetime
        run: echo "date=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: 创建 Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "web-release-${{ steps.datetime.outputs.date }}-${{ github.run_number }}"
          name: "Web Release ${{ steps.datetime.outputs.date }}-${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Release 产物
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: build/web/**/*.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
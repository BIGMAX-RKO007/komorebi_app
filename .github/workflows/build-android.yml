# ============================================================
# komorebi_app — Android CI/CD
# 触发：push 到 main 分支 / PR 到 main
# 产物：debug APK + release APK (split-per-abi)
# ============================================================
name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # 允许手动触发

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-linux-android,
            armv7-linux-androideabi,
            x86_64-linux-android,
            i686-linux-android

      - name: 缓存 Cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-android-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: cargo-android-

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-

      - name: 安装 flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.11.1

      - name: 生成 Rust ↔ Dart 绑定
        run: flutter_rust_bridge_codegen generate

      - name: 获取 Flutter 依赖
        run: flutter pub get

      - name: 构建 Android APK (debug)
        run: flutter build apk --debug

      - name: 构建 Android APK (release, split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: 构建 Android App Bundle (release)
        run: flutter build appbundle --release

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/*-debug.apk
          retention-days: 7

      - name: 上传 Release APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          retention-days: 14

      - name: 上传 Release App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 14

      - name: 设置日期时间
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: datetime
        run: echo "date=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: 创建 Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "android-release-${{ steps.datetime.outputs.date }}-${{ github.run_number }}"
          name: "Android Release ${{ steps.datetime.outputs.date }}-${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Release 产物
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
# ============================================================
# komorebi_app — macOS CI/CD
# 触发：push 到 main 分支 / PR 到 main
# 产物：macOS 可执行文件
# ============================================================
name: macOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      # ---- 基础环境 ----
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 构建 macOS 应用 (release)
        run: flutter build macos

      # ---- 上传产物 ----
      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos
          retention-days: 14
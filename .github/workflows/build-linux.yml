# ============================================================
# komorebi_app — Linux CI/CD
# 触发：push 到 main 分支 / PR 到 main
# 产物：Linux 可执行文件
# ============================================================
name: Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write  # 这行是关键：允许 Action 创建 Release 和上传附件

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 安装 Linux 桌面编译依赖
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: 构建 Linux 应用 (release)
        run: flutter build linux

      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux
          retention-days: 14

      - name: 设置日期时间
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: datetime
        run: echo "date=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: 创建 Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "linux-release-${{ steps.datetime.outputs.date }}-${{ github.run_number }}"
          name: "Linux Release ${{ steps.datetime.outputs.date }}-${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Release 产物
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: build/linux/**/*.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
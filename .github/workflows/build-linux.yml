# ============================================================
# komorebi_app — Linux CI/CD
# 触发：push 到 main 分支 / PR 到 main
# 产物：Linux 可执行文件
# ============================================================
name: Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ---- 基础环境 ----
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 构建 Linux 应用 (release)
        run: flutter build linux

      # ---- 上传产物 ----
      - name: 上传 Linux 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: build/linux
          retention-days: 14